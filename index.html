<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mower Zones — Vector Drawing</title>
  <style>
    body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
    #sidebar { width: 240px; padding: 12px; box-sizing: border-box; border-right: 1px solid #ccc; overflow-y: auto; }
    #stage { flex: 1; position: relative; overflow: auto; background: #eef; }
    #stage img { display: block; object-fit: contain; }
    #svg { position: absolute; top: 0; left: 0; }
    .row { margin-bottom: 10px; }
    label { display: block; font-size: 12px; margin-bottom: 2px; }
    input[type="number"] { width: 70px; }
    button { display: block; width: 100%; margin-bottom: 6px; padding: 6px; cursor: pointer; }
    #palette { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .swatch { height: 28px; border: 2px solid transparent; cursor: pointer; border-radius: 4px; }
    .swatch.selected { border-color: #000; }
    #zoneList li { font-size: 13px; cursor: pointer; padding: 2px 4px; }
    #zoneList li.selected { background: #ddf; }
    polygon { cursor: pointer; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="row">
      <label>Background image</label>
      <select id="imageSelect"></select>
    </div>
    <div class="row">
      <label>x-max</label><input type="number" id="xMax" />
      <label>y-max</label><input type="number" id="yMax" />
    </div>
    <button id="newPolygon">New polygon</button>
    <div class="row" id="paletteRow" style="display:none;">
      <label>Pick color</label>
      <div id="palette"></div>
    </div>
    <button id="exportBtn">Export</button>
    <button id="importBtn">Import</button>
    <input type="file" id="importInput" accept="application/json" style="display:none;" />
    <div class="row">
      <label>Zones</label>
      <ul id="zoneList" style="padding-left:16px;"></ul>
    </div>
    <div class="row" style="font-size:12px;color:#666;">
      Esc: remove last point · Delete: remove selected zone
    </div>
  </div>
  <div id="stage">
    <img id="bg" alt="" />
    <svg id="svg"></svg>
  </div>

  <script src="logic.js"></script>
  <script>
    // logic.js loads above as a classic script, exposing its functions and
    // constants in the shared global scope: CLOSE_THRESHOLD_PX, PALETTE,
    // DEFAULT_X_MAX, DEFAULT_Y_MAX, pixelToNorm, normToPixel,
    // isNearFirstPoint, serialize, deserialize.

    const SVGNS = "http://www.w3.org/2000/svg";
    const state = { xMax: DEFAULT_X_MAX, yMax: DEFAULT_Y_MAX, image: "", zones: [] };
    let drawing = null;          // { name, color, points: number[][] (coord scale) }
    let pendingColor = PALETTE[0];
    let selectedIndex = -1;

    // Selectable background images, served from the assets/ folder. Add a new
    // line here to offer another image (directory listing is not possible on file://).
    const ASSETS = [
      { label: "Náčrt", path: "assets/podklad-nakres.jpg" },
      { label: "Mapa", path: "assets/podklad-mapa.jpg" },
    ];

    const els = {
      imageSelect: document.getElementById("imageSelect"),
      xMax: document.getElementById("xMax"),
      yMax: document.getElementById("yMax"),
      newPolygon: document.getElementById("newPolygon"),
      paletteRow: document.getElementById("paletteRow"),
      palette: document.getElementById("palette"),
      exportBtn: document.getElementById("exportBtn"),
      importBtn: document.getElementById("importBtn"),
      importInput: document.getElementById("importInput"),
      zoneList: document.getElementById("zoneList"),
      bg: document.getElementById("bg"),
      svg: document.getElementById("svg"),
      stage: document.getElementById("stage"),
    };

    els.xMax.value = state.xMax;
    els.yMax.value = state.yMax;
    els.xMax.addEventListener("change", () => { state.xMax = Number(els.xMax.value); syncSvgSize(); render(); });
    els.yMax.addEventListener("change", () => { state.yMax = Number(els.yMax.value); syncSvgSize(); render(); });

    // Canvas pixel size, fitted into the available stage area. The aspect ratio
    // comes from the loaded image (so it is never distorted); without an image,
    // it falls back to the xMax:yMax ratio. xMax/yMax otherwise only affect
    // export/import scale, not the on-screen drawing (points are normalized).
    function canvasSize() {
      const availW = els.stage.clientWidth || 600;
      const availH = els.stage.clientHeight || 400;
      const aspect = (state.image && els.bg.naturalWidth)
        ? els.bg.naturalWidth / els.bg.naturalHeight
        : state.xMax / state.yMax;
      let w = availW;
      let h = w / aspect;
      if (h > availH) { h = availH; w = h * aspect; }
      return { w: Math.floor(w), h: Math.floor(h) };
    }

    function displaySize() {
      return canvasSize();
    }

    function syncSvgSize() {
      const { w, h } = displaySize();
      els.svg.setAttribute("width", w);
      els.svg.setAttribute("height", h);
      // Scale the background image into the canvas box, preserving its aspect
      // ratio (object-fit: contain). Empty when no image is loaded.
      els.bg.style.width = w + "px";
      els.bg.style.height = h + "px";
      els.svg.style.background = state.image ? "transparent" : "#fff";
    }

    // path is an assets/ file path, or "" for no background image.
    function setImage(path) {
      state.image = path;
      if (path) {
        els.bg.src = path;        // the load event re-syncs the canvas and renders
      } else {
        els.bg.removeAttribute("src");
        syncSvgSize();
        render();
      }
    }
    els.bg.addEventListener("load", () => { syncSvgSize(); render(); });

    // Populate the background image dropdown.
    const noneOption = document.createElement("option");
    noneOption.value = "";
    noneOption.textContent = "— žiadny —";
    els.imageSelect.appendChild(noneOption);
    ASSETS.forEach((a) => {
      const opt = document.createElement("option");
      opt.value = a.path;
      opt.textContent = a.label;
      els.imageSelect.appendChild(opt);
    });
    els.imageSelect.addEventListener("change", () => setImage(els.imageSelect.value));

    // Build palette swatches.
    PALETTE.forEach((color) => {
      const sw = document.createElement("div");
      sw.className = "swatch";
      sw.style.background = color;
      sw.addEventListener("click", () => {
        pendingColor = color;
        [...els.palette.children].forEach((c) => c.classList.remove("selected"));
        sw.classList.add("selected");
        // Apply the chosen color to the polygon currently being drawn.
        if (drawing) { drawing.color = color; render(); }
      });
      els.palette.appendChild(sw);
    });

    els.newPolygon.addEventListener("click", () => {
      const name = prompt("Polygon name:");
      if (name === null || name.trim() === "") return;
      els.paletteRow.style.display = "block";
      drawing = { name: name.trim(), color: pendingColor, points: [] };
      selectedIndex = -1;
      render();
    });

    // Convert a mouse event to a normalized (0..1) canvas point.
    function eventToNorm(e) {
      const rect = els.svg.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const py = e.clientY - rect.top;
      const { w, h } = displaySize();
      return [pixelToNorm(px, w), pixelToNorm(py, h)];
    }

    els.svg.addEventListener("click", (e) => {
      if (!drawing) return;
      const norm = eventToNorm(e);
      const { w, h } = displaySize();
      if (drawing.points.length >= 3) {
        const firstPx = [
          normToPixel(drawing.points[0][0], w),
          normToPixel(drawing.points[0][1], h),
        ];
        const clickPx = [normToPixel(norm[0], w), normToPixel(norm[1], h)];
        if (isNearFirstPoint(clickPx, firstPx, CLOSE_THRESHOLD_PX)) {
          state.zones.push({ name: drawing.name, color: drawing.color, points: drawing.points });
          drawing = null;
          els.paletteRow.style.display = "none";
          render();
          return;
        }
      }
      drawing.points.push(norm);
      render();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && drawing) {
        drawing.points.pop();
        render();
      } else if (e.key === "Delete" && selectedIndex >= 0) {
        state.zones.splice(selectedIndex, 1);
        selectedIndex = -1;
        render();
      }
    });

    function normPointsToPixelString(points) {
      const { w, h } = displaySize();
      return points
        .map(([nx, ny]) => `${normToPixel(nx, w)},${normToPixel(ny, h)}`)
        .join(" ");
    }

    // Average of a zone's normalized points, in pixel space — places its label.
    function centroidPixel(points) {
      const { w, h } = displaySize();
      let sx = 0, sy = 0;
      points.forEach(([nx, ny]) => { sx += nx; sy += ny; });
      return [
        normToPixel(sx / points.length, w),
        normToPixel(sy / points.length, h),
      ];
    }

    function render() {
      els.svg.innerHTML = "";
      state.zones.forEach((zone, i) => {
        const poly = document.createElementNS(SVGNS, "polygon");
        poly.setAttribute("points", normPointsToPixelString(zone.points));
        poly.setAttribute("fill", zone.color);
        poly.setAttribute("fill-opacity", i === selectedIndex ? "0.6" : "0.35");
        poly.setAttribute("stroke", zone.color);
        poly.setAttribute("stroke-width", i === selectedIndex ? "3" : "1.5");
        poly.addEventListener("click", (ev) => {
          ev.stopPropagation();
          if (drawing) return;
          selectedIndex = i;
          render();
        });
        els.svg.appendChild(poly);
      });

      // Zone name labels, centered, dark font, drawn on top of the polygons.
      state.zones.forEach((zone) => {
        if (zone.points.length === 0) return;
        const [cx, cy] = centroidPixel(zone.points);
        const label = document.createElementNS(SVGNS, "text");
        label.setAttribute("x", cx);
        label.setAttribute("y", cy);
        label.setAttribute("text-anchor", "middle");
        label.setAttribute("dominant-baseline", "central");
        label.setAttribute("fill", "#1f2937");
        label.setAttribute("font-size", "13");
        label.setAttribute("font-family", "sans-serif");
        label.setAttribute("pointer-events", "none");
        label.textContent = zone.name;
        els.svg.appendChild(label);
      });

      if (drawing && drawing.points.length > 0) {
        const line = document.createElementNS(SVGNS, "polyline");
        line.setAttribute("points", normPointsToPixelString(drawing.points));
        line.setAttribute("fill", "none");
        line.setAttribute("stroke", drawing.color);
        line.setAttribute("stroke-width", "2");
        els.svg.appendChild(line);
        const { w, h } = displaySize();
        drawing.points.forEach(([nx, ny]) => {
          const c = document.createElementNS(SVGNS, "circle");
          c.setAttribute("cx", normToPixel(nx, w));
          c.setAttribute("cy", normToPixel(ny, h));
          c.setAttribute("r", "4");
          c.setAttribute("fill", drawing.color);
          els.svg.appendChild(c);
        });
      }

      renderZoneList();
    }

    function renderZoneList() {
      els.zoneList.innerHTML = "";
      state.zones.forEach((zone, i) => {
        const li = document.createElement("li");
        li.textContent = zone.name;
        li.style.color = zone.color;
        if (i === selectedIndex) li.classList.add("selected");
        li.addEventListener("click", () => { selectedIndex = i; render(); });
        els.zoneList.appendChild(li);
      });
    }

    els.exportBtn.addEventListener("click", () => {
      state.xMax = Number(els.xMax.value);
      state.yMax = Number(els.yMax.value);
      const blob = new Blob([serialize(state)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "zones.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    els.importBtn.addEventListener("click", () => els.importInput.click());
    els.importInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const loaded = deserialize(reader.result);
        state.xMax = loaded.xMax;
        state.yMax = loaded.yMax;
        state.zones = loaded.zones;
        els.xMax.value = state.xMax;
        els.yMax.value = state.yMax;
        selectedIndex = -1;
        drawing = null;
        els.paletteRow.style.display = "none";
        els.imageSelect.value = loaded.image || "";
        setImage(loaded.image || "");
      };
      reader.readAsText(file);
    });

    window.addEventListener("resize", () => { syncSvgSize(); render(); });

    // Show the blank drawing canvas immediately on load.
    syncSvgSize();
    render();
  </script>
</body>
</html>
